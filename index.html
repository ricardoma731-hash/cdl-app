<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>CDL Arujá App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f6fa;
      text-align: center;
    }

    header {
      background: white;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    header img {
      max-width: 180px;
    }

    h1 {
      margin-top: 10px;
      color: #1e3a8a;
    }

    .container {
      padding: 30px;
    }

    .btn {
      display: block;
      width: 90%;
      max-width: 400px;
      margin: 10px auto;
      padding: 15px;
      border-radius: 10px;
      text-decoration: none;
      color: white;
      font-size: 16px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .spc { background: #2563eb; }
    .whatsapp { background: #25D366; }
    .servicos { background: #7c3aed; }
    .cartao { background: #f59e0b; }

    footer {
      margin-top: 40px;
      background: #1e3a8a;
      color: white;
      padding: 20px;
      font-size: 14px;
    }

    footer img {
      max-width: 80px;
      margin: 5px;
    }
  </style>
</head>

<body>

  <!-- TOPO COM LOGO -->
  <header>
    <img src="LOGO CDL ARUJA PNG.png"> 
    <h1>CDL Arujá</h1>
    <p>Painel do Associado</p>
  </header>

  <!-- BOTÕES -->
  <div class="container">

    <!-- SPC -->
    <a class="btn spc"
       href="https://login.spcbrasil.com.br/realms/associado/protocol/openid-connect/auth"
       target="_blank">
       Consultar SPC
    </a>

    <!-- BOLETOS -->
    <a class="btn whatsapp"
       href="https://wa.me/551125026700?text=Quero%20segunda%20via%20de%20boleto"
       target="_blank">
       Boletos
    </a>

    <!-- ATENDIMENTO -->
    <a class="btn whatsapp"
       href="https://wa.me/551125026700?text=Preciso%20de%20atendimento"
       target="_blank">
       Atendimento
    </a>

    <!-- SERVIÇOS -->
    <a class="btn servicos"
       href="https://cdlaruja.org.br"
       target="_blank">
       Serviços CDL
    </a>

    <!-- NOVO BOTÃO -->
    <a class="btn cartao"
       href="https://wa.me/551125026700?text=Quero%20saber%20sobre%20o%20Cartão%20Benefícios"
       target="_blank">
       Cartão Benefícios
    </a>

  </div>

  <!-- RODAPÉ -->
  <footer>
    <p>Sistema CNDL</p>

   <img src="Rodapé papel.png" style="max-width: 100%;">

    <p>
      Rua Adhemar de Barros, 95 - Arujá/SP<br>
      CEP: 07401-290<br>
      www.cdlaruja.org.br
    </p>
  </footer>

</body>
</html>
