<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CDL Arujá</title>

<style>
body {
  font-family: Arial, sans-serif;
  background:#f2f4f8;
  margin:0;
  text-align:center;
}

.logo {
  width:180px;
  margin-top:20px;
}

input {
  width:90%;
  max-width:300px;
  padding:12px;
  margin:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

.button {
  display:block;
  width:90%;
  max-width:300px;
  margin:10px auto;
  padding:15px;
  border-radius:10px;
  color:white;
  text-decoration:none;
  font-weight:bold;
}

.azul { background:#2f5bd3; }
.verde { background:#22c55e; }
.roxo { background:#7c3aed; }
.laranja { background:#f59e0b; }

.hidden { display:none; }

footer {
  margin-top:40px;
  padding:10px 0;
  background:#f2f4f8;
}

footer img {
  width:90%;
  max-width:400px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">

<img src="LOGO CDL ARUJA PNG.png" class="logo">

<h2>Área do Associado</h2>

<input type="text" id="cpf" placeholder="Digite seu CPF">

<button class="button azul" onclick="login()">Entrar</button>

</div>

<!-- PAINEL -->
<div id="painel" class="hidden">

<img src="LOGO CDL ARUJA PNG.png" class="logo">

<h2 id="nomeUser"></h2>

<a class="button azul" href="https://login.spcbrasil.com.br" target="_blank">
Consultar SPC
</a>

<a class="button verde" href="https://wa.me/551125026700?text=Olá,%20preciso%20de%20meus%20boletos" target="_blank">
Boletos
</a>

<a class="button verde" href="https://wa.me/551125026700?text=Olá,%20preciso%20de%20atendimento" target="_blank">
Atendimento
</a>

<a class="button roxo" href="https://wa.me/551125026700?text=Olá,%20quero%20conhecer%20os%20serviços%20da%20CDL" target="_blank">
Serviços CDL
</a>

<a class="button laranja" href="https://wa.me/551125026700?text=Olá,%20quero%20informações%20sobre%20o%20cartão" target="_blank">
Cartão Benefícios
</a>

<button class="button" onclick="logout()" style="background:#111;">
Sair
</button>

</div>

<!-- RODAPÉ -->
<footer>
<img src="rodape.png">
</footer>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabase = window.supabase.createClient(
  "https://yxydyjymidbbkvkmixko.supabase.co",
  "sb_publishable__amgmxDmiB8QHNqjc_jZVQ_hF9xsMKM"
);

async function login() {
  let cpf = document.getElementById("cpf").value.replace(/\D/g, "");

  if (!cpf) {
    alert("Digite o CPF");
    return;
  }

  console.log("CPF digitado:", cpf);

  let { data, error } = await supabase
    .from("associados")
    .select("*")
    .eq("cpf", cpf)
    .single();

  console.log("RETORNO:", data, error);

  if (error || !data) {
    alert("CPF não encontrado. Procure a CDL.");
    return;
  }

  document.getElementById("nomeUser").innerText = "Olá, " + data.nome;

  document.getElementById("login").classList.add("hidden");
  document.getElementById("painel").classList.remove("hidden");
}

function logout() {
  document.getElementById("painel").classList.add("hidden");
  document.getElementById("login").classList.remove("hidden");
}
</script>

</body>
</html>
