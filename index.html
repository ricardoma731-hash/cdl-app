<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CDL Arujá</title>

<style>
body { font-family: Arial; background:#f2f4f8; margin:0; text-align:center; }
.logo { width:180px; margin-top:20px; }
.container { padding:20px; }

input {
  width:90%; max-width:300px;
  padding:12px; margin:10px;
  border-radius:8px; border:1px solid #ccc;
}

.button {
  display:block;
  width:90%; max-width:300px;
  margin:10px auto; padding:15px;
  border-radius:10px;
  color:white; text-decoration:none;
  font-weight:bold;
}

.azul { background:#2f5bd3; }
.verde { background:#22c55e; }
.roxo { background:#7c3aed; }
.laranja { background:#f59e0b; }

.hidden { display:none; }

footer {
  margin-top:40px;
  background:#0b2c6b;
  padding:20px;
}
footer img {
  width:100%;
  max-width:500px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<img src="LOGO CDL ARUJA PNG.png" class="logo">
<h2>Área do Associado</h2>

<input type="text" id="cpf" placeholder="Digite seu CPF">
<input type="text" id="nome" placeholder="Seu nome (primeiro acesso)">

<button class="button azul" onclick="login()">Entrar</button>
</div>

<!-- PAINEL -->
<div id="painel" class="hidden">

<img src="LOGO CDL ARUJA PNG.png" class="logo">
<h2 id="nomeUser"></h2>

<!-- CONSULTAR SPC -->
<a class="button azul" href="https://login.spcbrasil.com.br/realms/associado/protocol/openid-connect/auth?response_type=code&client_id=spcjava&scope=openid+email+profile&redirect_uri=https%3A%2F%2Fsistema.spcbrasil.com.br%2Fspc%2Fopenid_connect_login&nonce=1e8521c5f6df2&state=3422ac90d4d8e" target="_blank">
Consultar SPC
</a>

<!-- BOLETOS -->
<a class="button verde" href="https://wa.me/551125026700?text=Olá,%20preciso%20de%20meus%20boletos" target="_blank">
Boletos
</a>

<!-- ATENDIMENTO -->
<a class="button verde" href="https://wa.me/551125026700?text=Olá,%20preciso%20de%20atendimento" target="_blank">
Atendimento
</a>

<!-- SERVIÇOS -->
<a class="button roxo" href="https://wa.me/551125026700?text=Olá,%20quero%20conhecer%20os%20serviços" target="_blank">
Serviços CDL
</a>

<!-- CARTÃO -->
<a class="button laranja" href="https://wa.me/551125026700?text=Olá,%20quero%20informações%20sobre%20o%20cartão" target="_blank">
Cartão Benefícios
</a>

<button class="button" onclick="logout()" style="background:#111;">
Sair
</button>

</div>

<footer>
<img src="rodape.png">
</footer>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const supabase = window.supabase.createClient(
  "https://yxydyjymidbbkvkmixko.supabase.co",
  ""sb_publishable_amgmxDmiB8QHNqjc_jZVQ_hF9xsMKM""
);

async function login() {
  let cpf = document.getElementById("cpf").value.replace(/\D/g, "");

  let { data, error } = await supabase
    .from("associados")
    .select("*")
    .eq("cpf", cpf)
    .single();

  if (error || !data) {
    alert("CPF não encontrado. Procure a CDL.");
    return;
  }

  document.getElementById("nomeUser").innerText = "Olá, " + data.nome;

  document.getElementById("login").classList.add("hidden");
  document.getElementById("painel").classList.remove("hidden");
}

function logout() {
  document.getElementById("painel").classList.add("hidden");
  document.getElementById("login").classList.remove("hidden");
}

</script>

</body>
</html>
